baseURL = 'https://example.org/'
defaultContentLanguage = 'zh-cn'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'

[outputFormats.json]
  name = "json"
  mediaType = "application/json"
  baseName = "posts"
  isPlainText = true
  notAlternative = true

