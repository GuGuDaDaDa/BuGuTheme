{{- $summary := .Get 0 | default (.Get "summary") | default "详情" -}}
<div class="fold collapsed">
  <div class="fold-header"
       onclick="(function(el){var box=el.closest('.fold');var collapsed=box.classList.toggle('collapsed');box.querySelector('.fold-toggle').setAttribute('aria-label',collapsed?'展开':'收起');})(this)"
       role="button" tabindex="0"
       aria-label="展开">
    <span class="fold-icon"></span>
    <span class="fold-label">{{ $summary }}</span>
    <span class="fold-toggle" aria-hidden="true">
      <span class="fold-chevron"></span>
    </span>
  </div>
  <div class="fold-body">
    {{- .Inner | markdownify -}}
  </div>
</div>
