{{ define "main" }}
<div class="app-inner">
  <div class="article-header-wrapper">
    {{ partial "article-header.html" . }}
  </div>
  <div class="article-layout">
    <article class="article-page">
      <div class="article-content">
        {{ .Content }}
      </div>
      {{ partial "article-copyright.html" . }}
      {{ partial "article-footer.html" . }}
      {{ partial "giscus.html" . }}
    </article>
    {{ partial "toc.html" . }}
  </div>
</div>
{{ end }}
