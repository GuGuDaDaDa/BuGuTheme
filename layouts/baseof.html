<!DOCTYPE html>
<html lang="{{ or site.Language.Locale `en` }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="app-shell">
    {{ partial "header.html" . }}
    <div class="site-scrollport" id="site-scrollport">
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </div>
  {{ partialCached "head/js.html" . }}
  {{ partial "search-modal.html" . }}
  {{ partial "lightbox.html" . }}
  {{ partial "footnotes-tooltip.html" . }}
</body>
</html>
