{{- /* Article footer: tags + prev/next navigation */}}
{{- with .Params.tags }}
<div class="article-tags">
  {{- range . }}
  <a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="tag">{{ . }}</a>
  {{- end }}
</div>
{{- end }}

<nav class="article-nav">
  <div class="article-nav-item prev">
    {{- with .PrevInSection }}
    <a href="{{ .RelPermalink }}">
      <span class="article-nav-label">&#8592; 上一篇</span>
      <span class="article-nav-title">{{ .Title }}</span>
    </a>
    {{- else }}
    <span class="article-nav-empty">
      <span class="article-nav-label">&#8592; 上一篇</span>
      <span class="article-nav-title">已经是第一篇了</span>
    </span>
    {{- end }}
  </div>
  <div class="article-nav-item next">
    {{- with .NextInSection }}
    <a href="{{ .RelPermalink }}">
      <span class="article-nav-label">下一篇 &#8594;</span>
      <span class="article-nav-title">{{ .Title }}</span>
    </a>
    {{- else }}
    <span class="article-nav-empty">
      <span class="article-nav-label">下一篇 &#8594;</span>
      <span class="article-nav-title">已经是最后一篇了</span>
    </span>
    {{- end }}
  </div>
</nav>
