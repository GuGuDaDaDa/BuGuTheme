<!-- Desktop tooltip -->
<div class="fn-tooltip" id="fn-tooltip" role="tooltip" aria-hidden="true">
  <span class="fn-tooltip-num" id="fn-tooltip-num"></span>
  <span class="fn-tooltip-content" id="fn-tooltip-content"></span>
  <span class="fn-tooltip-source" id="fn-tooltip-source"></span>
  <a class="fn-tooltip-goto" id="fn-tooltip-goto" role="button">↓ 跳到文末</a>
  <div class="fn-tooltip-arrow" id="fn-tooltip-arrow"></div>
</div>

<!-- Mobile panel -->
<div class="fn-panel-overlay" id="fn-panel-overlay" aria-hidden="true"></div>
<div class="fn-panel" id="fn-panel" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="fn-panel-handle"><div class="fn-panel-handle-bar"></div></div>
  <div class="fn-panel-header">
    <span class="fn-panel-title">引用</span>
    <button class="fn-panel-close" id="fn-panel-close" aria-label="关闭">&times;</button>
  </div>
  <div class="fn-panel-body" id="fn-panel-body"></div>
</div>
