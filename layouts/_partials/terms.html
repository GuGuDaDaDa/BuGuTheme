{{- /*
  Renders a taxonomy term as a capsule-style pill link.

  @context {dict} with keys:
    - Page: a Hugo Taxonomy page (required)
    - Count: number of pages in this term (optional)
*/}}
<a href="{{ .Page.RelPermalink }}" class="term-pill">
  {{ .Page.Title }}
  {{- with .Count }} <span class="term-count">({{ . }})</span>{{- end }}
</a>
