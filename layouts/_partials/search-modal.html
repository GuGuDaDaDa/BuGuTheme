{{- /* Client-side search modal — Fuse.js based */}}
<div class="search-modal" id="search-modal" aria-hidden="true">
  <div class="search-backdrop" id="search-backdrop"></div>
  <div class="search-panel">
    <div class="search-header">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="{{ i18n `search.placeholder` }}"
        autocomplete="off"
        aria-label="{{ i18n `search.placeholder` }}"
      />
      <button class="search-close" id="search-close" aria-label="{{ i18n `search.close` }}">&times;</button>
    </div>
    <div class="search-body" id="search-body">
      <p class="search-hint" id="search-hint">{{ i18n "search.hint" }}</p>
      <div class="search-loading" id="search-loading" style="display:none">
        <span class="search-spinner"></span>
        <span>{{ i18n "search.loading" }}</span>
      </div>
      <div class="search-results" id="search-results" style="display:none"></div>
    </div>
  </div>
</div>
