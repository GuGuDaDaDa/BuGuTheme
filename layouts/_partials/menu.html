<nav class="site-nav" id="site-nav">
  <div class="site-nav-links">
  {{- $currentPage := . }}
  {{- range site.Menus.main }}
    {{- $active := or ($currentPage.IsMenuCurrent "main" .) (and .Page (ne .Page.Kind "home") ($currentPage.HasMenuCurrent "main" .)) }}
    {{- $label := or (and .Identifier (i18n (printf "menu.%s" .Identifier))) .Name }}
    <a href="{{ .URL }}" class="{{ if $active }}active{{ end }}">{{ $label }}</a>
  {{- end }}
  </div>
</nav>
