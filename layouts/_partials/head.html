<script>
  (function () {
    var stored = null;
    try { stored = localStorage.getItem('bugublog-theme'); } catch (_) {}
    if (stored === 'dark' || stored === 'light') {
      document.documentElement.setAttribute('data-theme', stored);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
<style>
  :root { --initial-bg: #fcfcfb; }
  html[data-theme="dark"] { --initial-bg: #1a1a1a; }
  html, body { background: var(--initial-bg); }
  .theme-icon::before { content: '🌙'; }
  html[data-theme="dark"] .theme-icon::before { content: '☀️'; }
</style>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#272727" media="(prefers-color-scheme: dark)">
{{ block "meta" . }}{{ end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
<title>{{ block "title" . }}{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s - %s" .Title site.Title }}{{ end }}{{ end }}</title>
{{ partial "meta.html" . }}
{{ partialCached "head/css.html" . }}
{{ partial "google-analytics.html" . }}
